# ═══════════════════════════════════════════════════════════
# TelDriveManager — 统一配置文件
# ═══════════════════════════════════════════════════════════

[server]
port = 8888

[auth]
username = ""
password = ""

# ─── PikPak 离线下载 ───
[pikpak]
login_mode = "password"             # "password" 或 "token"
username = ""
password = ""
session = ""                        # 当 login_mode = "token" 时填写 encoded_token
save_dir = "/"
delete_after_download = true
parse_concurrency = 1               # 磁链解析并发数，1-16
accounts = []                        # Web 页面会维护多个 PikPak 账号；旧 username/password/session 会自动迁移
poll_interval = 3
max_wait_time = 3600
magnet_parse_timeout = 300           # 磁链解析“无进展”超时（秒）：云端长时间无任何下载进度（死种/无人做种）时自动跳过；0 关闭
share_parse_timeout = 45             # 分享解析/转存请求超时（秒）
share_download_url_timeout = 60      # 分享转存后等待直链就绪超时（秒）
share_download_url_poll_interval = 3 # 分享直链轮询间隔（秒）

# ─── Aria2 本地托管下载引擎 ───
[aria2]
managed = true
installed = false
os_type = ""                        # "win" 或 "linux"
binary_path = ""
rpc_url = "http://127.0.0.1"
rpc_port = 6822
rpc_secret = ""
allow_remote_access = false          # true 时监听 0.0.0.0，允许外部设备访问 RPC
max_concurrent = 3                   # 最大同时下载任务数
split = 8                            # 单任务分块数
max_connection_per_server = 8        # 单服务器最大连接数
min_split_size_mb = 5                # 最小分块大小（MB）
disk_protection_threshold_gb = 5     # 剩余空间低于该值时自动保护并暂停 aria2 新下载
download_dir = "./downloads"        # 固定由程序托管到项目 downloads 目录

# ─── 远程 aria2 推送（可选） ───
# 开启后，本地推送下载时会同步向远程 aria2 下载器推送一份相同的下载链接
[remote_aria2]
enabled = false                     # true 时启用远程推送
rpc_url = "http://127.0.0.1"        # 远程 aria2 RPC 地址（如 http://192.168.1.10）
rpc_port = 6800                     # 远程 aria2 RPC 端口
rpc_secret = ""                     # 远程 aria2 RPC 密码（token）
split = 0                           # 推送时的单任务分块数/线程数；0=不覆盖，沿用远程 aria2 自身配置
max_connection_per_server = 0       # 推送时的单服务器最大连接数；0=不覆盖
min_split_size_mb = 0               # 推送时的最小分块大小（MB）；0=不覆盖

# ─── TelDrive 云盘（共享） ───
[teldrive]
api_host = ""
access_token = ""
channel_id = 0
chunk_size = "250M"
upload_concurrency = 4
upload_dir = ""
random_chunk_name = true
target_path = "/"

# ─── Aria2→TelDrive 自动上传 ───
[upload]
max_retries = 3
auto_delete = true
serial_transfer_mode = false       # 开启后下载/上传总占用强制为 1，需等上一个上传完成并释放磁盘后才继续下一个下载
min_throughput_kbps = 100          # 上传超时按此最低吞吐估算（KB/s）；链路慢可调低，避免大文件被超时中断
parallel_chunk_upload = false      # 试验功能：单文件多分块并行上传（并发数取 teldrive.upload_concurrency）；默认关闭走串行

# ─── Telegram 消息同步 ───
[telegram]
api_id = 0
api_hash = ""
channel_id = 0
session_name = "tel2teldrive_session"
sync_interval = 10
sync_enabled = true
max_scan_messages = 10000
confirm_cycles = 3

# ─── 回源（视频检测→下载→重传 TelDrive→删源消息） ───
# 回源复用主监听账号（同一个 Telegram 客户端，已登录且已缓存频道实体），无需单独登录/扫码。
# proxy_*：填了代理则主监听客户端（回源也复用之）走该代理；全部留空则直连。session_name 当前不生效。
[telegram_relay]
enabled = false
session_name = "tel2teldrive_relay_session"
proxy_type = "socks5"  # socks5 / http / https
proxy_host = ""        # 留空=直连；填写则整个 Telegram 连接走此代理
proxy_port = 1080
proxy_username = ""
proxy_password = ""
download_dir = "./telegram_relay"
concurrency = 1
max_retries = 3

[telegram_db]
host = ""
port = 5432
user = ""
password = ""
name = "postgres"

# ─── 日志 ───
[log]
buffer_size = 400
file = "runtime.log"
