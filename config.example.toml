# ═══════════════════════════════════════════════════════════
# TelDriveManager — 统一配置文件
# ═══════════════════════════════════════════════════════════

[server]
port = 8888

[auth]
username = ""
password = ""

# ─── PikPak 离线下载 ───
[pikpak]
login_mode = "password"             # "password" 或 "session"
username = ""
password = ""
session = ""                        # 当 login_mode = "session" 时填写 encoded_token / session
save_dir = "/"
delete_after_download = true
poll_interval = 3
max_wait_time = 3600
share_download_url_timeout = 60      # 分享转存后等待直链就绪超时（秒）
share_download_url_poll_interval = 3 # 分享直链轮询间隔（秒）

# ─── Aria2 本地托管下载引擎 ───
[aria2]
managed = true
installed = false
os_type = ""                        # "win" 或 "linux"
binary_path = ""
rpc_url = "http://127.0.0.1"
rpc_port = 6800
rpc_secret = ""
max_concurrent = 3                   # 最大同时下载任务数
split = 8                            # 单任务分块数
max_connection_per_server = 8        # 单服务器最大连接数
min_split_size_mb = 5                # 最小分块大小（MB）
download_dir = "./downloads"        # 固定由程序托管到项目 downloads 目录

# ─── TelDrive 云盘（共享） ───
[teldrive]
api_host = ""
access_token = ""
channel_id = 0
chunk_size = "500M"
upload_concurrency = 4
upload_dir = ""
random_chunk_name = true
target_path = "/"

# ─── Aria2→TelDrive 自动上传 ───
[upload]
max_retries = 3
auto_delete = true

# ─── Telegram 消息同步 ───
[telegram]
api_id = 0
api_hash = ""
channel_id = 0
session_name = "tel2teldrive_session"
sync_interval = 10
sync_enabled = true
max_scan_messages = 10000
confirm_cycles = 3

# ─── TelDrive 数据库（Telegram同步可选） ───
[telegram_db]
host = ""
port = 5432
user = ""
password = ""
name = "postgres"

# ─── 日志 ───
[log]
buffer_size = 400
file = "runtime.log"
