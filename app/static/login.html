<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelDriveManager - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0b10;
            --bg-card: #1a1a26;
            --bg-input: #22222f;
            --border: #2a2a3c;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-dim: #55556a;
            --accent: #7c5cfc;
            --accent-hover: #8f72ff;
            --accent-glow: rgba(124, 92, 252, 0.2);
            --error: #f87171;
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(124, 92, 252, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(99, 70, 224, 0.04) 0%, transparent 60%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            from {
                transform: translate(0, 0) rotate(0deg);
            }

            to {
                transform: translate(2%, 1%) rotate(3deg);
            }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 380px;
            max-width: 90vw;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px 36px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3),
                0 0 80px rgba(124, 92, 252, 0.05);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-brand .icon {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
        }

        .login-brand h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c5cfc, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-brand p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #6346e0);
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, var(--accent-hover), #7556f0);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(124, 92, 252, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            margin-top: 16px;
            padding: 10px 14px;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            border-radius: 8px;
            color: var(--error);
            font-size: 13px;
            text-align: center;
            display: none;
            animation: shakeIn 0.3s ease;
        }

        .error-msg.show {
            display: block;
        }

        @keyframes shakeIn {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <span class="icon">⚡</span>
                <h1>TelDriveManager</h1>
                <p>请输入管理员账号和密码</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" autofocus required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">🔓 登录</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) return;

            btn.classList.add('loading');
            btn.disabled = true;
            errEl.classList.remove('show');

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await resp.json();

                if (resp.ok && data.success) {
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.message || '用户名或密码错误';
                    errEl.classList.add('show');
                }
            } catch (err) {
                errEl.textContent = '网络错误，请重试';
                errEl.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // 回车提交
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
        });
    </script>
</body>

</html>
